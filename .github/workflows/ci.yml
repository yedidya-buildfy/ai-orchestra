name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: install tmux (needed for live tmux tests)
        run: sudo apt-get update && sudo apt-get install -y tmux
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run
      - run: npx tsup
